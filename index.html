        <style>
            @font-face {
                font-family: "source_code_pro";
                src: url("/assets/source_code_pro_regular.ttf") format("truetype");
            }

            :root {
                --size-xs: 4px;
                --size-s: 9px;
                --size-m: 18px;
                --size-l: 36px;
                --content-width: 600px;
                --light-color: #fafeff;
                --alt-color: #95a5a6;
                --dark-color: #000000;
                --warn-color: #f4a955;

                font-family: "source_code_pro", monospace;
                line-height: 1.5;
                font-weight: 400;
                font-size: 18px;
                color-scheme: dark;
                color: var(--light-color);
                background-color: var(--dark-color);
                font-synthesis: none;
                text-rendering: optimizeLegibility;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            *, *::before, *::after {
                box-sizing: border-box;
                -webkit-user-drag: none;
            }

            html {
                background: black;
                height: 100%;
            }

            body {
                background: black;
                width: 100%;
                min-height: 100%;
                line-height: 1.5;
                margin: 0;
                text-shadow: 0 2px 8px black;
                position: relative;
                z-index: 0;
                background:
                    radial-gradient(circle at 30% 30%, #0a0c40, #030318 40%, transparent 60%),
                    radial-gradient(circle at 70% 70%, #050525, #020210 40%, transparent 60%),
                    #000;
                background-size: 150% 150%;
            }

            body::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                z-index: -1;
                background: url("/assets/nebula.webp") no-repeat center -20px;
                background-size: cover;
                opacity: 0;
                transition: opacity 3s ease;
            }

            body.loaded::before {
                opacity: 1;
            }

            body::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none;
                background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
                opacity: .06;
                mix-blend-mode: overlay;
            }

            a {
                text-decoration: none;
                color: inherit;
            }

            a:hover {
                box-shadow: 0 2px 0 0 var(--light-color);
            }

            h1 {
                white-space: nowrap;
                font-size: 32px;
            }

            .container {
                width: 100%;
                max-width: var(--content-width);
                padding: var(--size-m);
            }

            .center {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .warn {
                color: var(--warn-color);
            }

            .more {
                font-size: 20px;
            }

            a.warn:hover  {
                box-shadow: 0 2px 0 0 var(--warn-color);
            }

            #header {
                width: 100%;
                height: 200px;
                flex-direction: column;
            }

            #header span {
                margin-top: var(--size-m);
            }

            .logo {
                width: 100px;
                filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .5));
                user-select: none;
            }

            #social {
                padding: var(--size-m);
                display: flex;
                width: 100%;
                flex-wrap: wrap;
            }

            .social {
                margin: var(--size-m);
                display: flex;
                align-items: center;
            }

            .social svg {
                width: 25px;
                margin-right: var(--size-s);
            }

            .steam {
                color: #c5c3c0;
            }

            .steam:hover {
                box-shadow: 0 2px 0 0 #c5c3c0;
            }

            .youtube {
                color: #ff0033;
            }

            .youtube:hover {
                box-shadow: 0 2px 0 0 #ff0033;
            }

            .twitter {
                color: #1d9bf0;
            }

            .twitter:hover {
                box-shadow: 0 2px 0 0 #1d9bf0;
            }

            .bluesky {
                color: #0085ff;
            }

            .bluesky:hover {
                box-shadow: 0 2px 0 0 #0085ff;
            }

            .discord {
                color: #5865f2;
            }

            .discord:hover {
                box-shadow: 0 2px 0 0 #5865f2;
            }

            .email {
                color: #ffffff;
            }

            .email:hover {
                box-shadow: 0 2px 0 0 var(--light-color);
            }

            #footer {
                width: 100%;
                height: 100px;
                padding: var(--size-m);
                font-size: 14px;
            }

            .copyright {
                font-size: 14px;
                color: var(--alt-color);
            }
        </style>
    </head>
